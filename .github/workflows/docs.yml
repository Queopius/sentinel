name: Docs

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  docs-build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: packages/queopius/shield

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('packages/queopius/shield/docs/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install docs dependencies
        run: pip install -r docs/requirements.txt

      - name: Build docs (strict)
        run: mkdocs build --strict

  trigger-readthedocs:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: docs-build

    steps:
      - name: Trigger Read the Docs build (optional)
        env:
          RTD_TOKEN: ${{ secrets.RTD_TOKEN }}
          RTD_PROJECT: ${{ secrets.RTD_PROJECT }}
        run: |
          if [ -z "$RTD_TOKEN" ] || [ -z "$RTD_PROJECT" ]; then
            echo "Read the Docs trigger skipped (RTD_TOKEN or RTD_PROJECT missing)."
            exit 0
          fi

          curl -sS -X POST \
            -H "Authorization: Token ${RTD_TOKEN}" \
            -H "Content-Type: application/json" \
            "https://readthedocs.org/api/v3/projects/${RTD_PROJECT}/versions/latest/builds/" \
            -d '{}'
