name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  quality:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - php: '8.2'
            laravel: '11'
            testbench: '^9.0'
          - php: '8.2'
            laravel: '12'
            testbench: '^10.0'
          - php: '8.3'
            laravel: '11'
            testbench: '^9.0'
          - php: '8.3'
            laravel: '12'
            testbench: '^10.0'
          - php: '8.3'
            laravel: '13'
            testbench: '^11.0'
          - php: '8.4'
            laravel: '11'
            testbench: '^9.0'
          - php: '8.4'
            laravel: '12'
            testbench: '^10.0'
          - php: '8.4'
            laravel: '13'
            testbench: '^11.0'

    name: PHP ${{ matrix.php }} / Laravel ${{ matrix.laravel }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: sqlite3, pdo_sqlite, mbstring, openssl, json
          coverage: none
          tools: composer:v2

      - name: Verify SQLite extensions
        run: php -m | grep -E "sqlite3|pdo_sqlite"

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache/files
          key: ${{ runner.os }}-php${{ matrix.php }}-laravel${{ matrix.laravel }}-composer-${{ hashFiles('composer.json') }}
          restore-keys: |
            ${{ runner.os }}-php${{ matrix.php }}-laravel${{ matrix.laravel }}-composer-

      - name: Resolve Laravel matrix dependencies
        run: |
          composer config platform.php ${{ matrix.php }}
          composer require --dev "orchestra/testbench:${{ matrix.testbench }}" --no-update --no-interaction
          composer update --with-all-dependencies --no-interaction --prefer-dist --no-progress

      - name: Run tests
        run: vendor/bin/phpunit

      - name: Check formatting (Pint)
        run: vendor/bin/pint --test

      - name: Static analysis (PHPStan)
        run: vendor/bin/phpstan analyse
